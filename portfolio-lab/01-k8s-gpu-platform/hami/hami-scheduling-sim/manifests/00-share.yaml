# THE HEADLINE (VALIDATED): two pods SHARE one GPU - both reach Running. This is the
# thing the default scheduler cannot do: it treats nvidia.com/gpu as a whole integer, so
# two pods asking for a GPU consume two devices and it has no memory-slice concept. HAMi
# (with the mock device plugin answering the kubelet's Allocate) places both on a single
# device, each holding a 20% memory slice.
#
# Why gpumem-PERCENTAGE, not absolute gpumem: the mock plugin registers one device per MiB,
# so absolute gpumem (8x81920 MiB) exceeds the kubelet's ~120 GiB device limit and comes
# back capacity 0 (OutOfnvidia.com/gpumem). Percentage registers a small count (8x100) and
# allocates fine. Verified 2026-06-21: both pods Running on one node.
#
# Control-plane test: pause containers. Proves the SHARING DECISION + admission; the slice
# being ENFORCED inside the container is the real-GPU lab.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-share
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hami-share
  template:
    metadata:
      labels:
        app: hami-share
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
              nvidia.com/gpumem-percentage: 20
