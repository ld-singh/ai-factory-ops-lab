# Exercise 5 (per-device memory exhaustion): each pod fits a GPU on its own, but the
# SUM of their gpumem requests exhausts the node's per-device memory budget, so the
# last pod stays Pending with CardInsufficientMemory - even though whole GPUs (by
# count) are still free. This is the sharpest proof that HAMi accounts memory PER
# DEVICE, not just GPU count the way Lessons 1/1B do.
#
# The arithmetic (deterministic, policy-independent):
#   target node: 8 fake GPUs x 81920 MiB each (register-hami.sh defaults).
#   each pod asks for 30000 MiB. A GPU fits two (60000 < 81920) but not three
#   (90000 > 81920). So the node holds at most 8 x 2 = 16 such pods; the 17th cannot
#   be placed on any device and stays Pending. This bound comes from capacity, not
#   from a binpack/spread setting, so it holds on any HAMi scheduler policy.
#
# Contrast with Exercise 2 (02-overrequest-pending): there a SINGLE request exceeds
# any one GPU. Here every request fits a GPU; it is the aggregate that does not.
#
# Pinning: demo-mem-exhaustion.sh labels one pool node demo-node=target.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-mem-exhaustion
spec:
  replicas: 17
  selector:
    matchLabels:
      app: hami-mem-exhaustion
  template:
    metadata:
      labels:
        app: hami-mem-exhaustion
    spec:
      nodeSelector:
        demo-node: target
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
              nvidia.com/gpumem: 30000
