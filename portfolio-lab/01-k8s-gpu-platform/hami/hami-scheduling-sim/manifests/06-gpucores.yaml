# Exercise 6 (compute / gpucores accounting): the same shape as Exercise 5, but now
# the binding constraint is COMPUTE (nvidia.com/gpucores), not memory. This shows HAMi
# tracks the two fractional dimensions INDEPENDENTLY: a device can have memory to
# spare and still be full on cores.
#
# The arithmetic (deterministic):
#   target node: 8 fake GPUs, each devcore: 100 (%) and 81920 MiB.
#   each pod asks for gpucores: 60 and only 1000 MiB. By cores, a GPU fits one pod
#   (60) but not two (120 > 100). By memory it could fit dozens. So cores bind at one
#   pod per GPU: 8 pods Running, the 9th Pending.
#
# Expect a compute/cores-insufficient scheduling reason on the 9th pod.
#   TODO: confirm the exact reason string for your HAMi version (e.g. it may read
#   "CardInsufficientCore" / "CardComputeUnitsInsufficient"); the per-resource Pending
#   reasons have changed across releases. Confirm against the hami-scheduler logs and
#   https://github.com/Project-HAMi/HAMi, and record the real string in your evidence.
#
# Pinning: demo-gpucores.sh labels one pool node demo-node=target.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-gpucores
spec:
  replicas: 9
  selector:
    matchLabels:
      app: hami-gpucores
  template:
    metadata:
      labels:
        app: hami-gpucores
    spec:
      nodeSelector:
        demo-node: target
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
              nvidia.com/gpumem: 1000
              nvidia.com/gpucores: 60
