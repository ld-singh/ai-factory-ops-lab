# Scenario 4 (sharing at scale, run-to-confirm): six fractional pods, each asking for one
# GPU and a 30% memory slice. They coexist across the fleet's GPUs - more concurrent
# fractional tenants than the default scheduler could ever place (it gives each pod a
# whole device). The mock device plugin answers the kubelet Allocate, so they reach
# Running rather than failing admission.
#
# Memory is requested as a PERCENTAGE (see 00-share.yaml for why absolute gpumem can't
# register on fakes). Each node admits at most its 8 nvidia.com/gpu slots, so these six
# spread across the workers. Control-plane test; pause containers.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-binpack
spec:
  replicas: 6
  selector:
    matchLabels:
      app: hami-binpack
  template:
    metadata:
      labels:
        app: hami-binpack
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
              nvidia.com/gpumem-percentage: 30
