# Scenario 3: small fractional slices. The point is the SCHEDULER DECISION - watch the
# hami-scheduler "FilteringSucceed" events choose a node and score it for each fractional
# pod (the demo prints them). That decision is what the fake fleet proves.
#
#   TODO: confirm the exact Helm value that selects binpack vs spread for HAMI_VERSION; the
#   scheduler-policy value name has changed across releases, so it is not hardcoded here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-placement
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hami-placement
  template:
    metadata:
      labels:
        app: hami-placement
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
              nvidia.com/gpumem: 1000
              nvidia.com/gpucores: 10
