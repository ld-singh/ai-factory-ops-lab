# Scenario 3: small fractional slices. The point is the SCHEDULER DECISION - watch
# the hami-scheduler "FilteringSucceed" events choose a node and score it for each
# fractional pod (the demo prints them). Whether slices binpack onto one worker or
# spread is a HAMi scheduler policy.
#
# TODO: confirm the exact Helm value that selects binpack vs spread for the chart
# version you installed (HAMI_VERSION). The scheduler-policy value name has changed
# across releases, so it is not hardcoded here.
#
# NOTE on this fake fleet: HAMi's binder serializes binds and briefly locks a node
# per bind, so several concurrent fractional pods reach Running slowly (a quirk of
# binding onto simulated nodes, not a scheduling error). The placement DECISION is
# what this scenario demonstrates; full binding throughput needs a real cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-placement
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hami-placement
  template:
    metadata:
      labels:
        app: hami-placement
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
              nvidia.com/gpumem: 1000
              nvidia.com/gpucores: 10
