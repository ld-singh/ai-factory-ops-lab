# Scenario 2: request more GPU memory than any node has, so the pod cannot fit anywhere
# and stays Pending. This proves HAMi's per-device memory accounting at the control-plane
# level - a pure scheduler decision (it never reaches the kubelet), so it's the cleanest,
# most deterministic evidence on the fake fleet.
#
# 999999 MiB (~976 GiB) is far beyond any single simulated GPU (devmem 81920 here). Expect
# Pending with CardInsufficientMemory in the pod's events.
apiVersion: v1
kind: Pod
metadata:
  name: hami-overrequest
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: registry.k8s.io/pause:3.9
      resources:
        limits:
          nvidia.com/gpu: 1
          nvidia.com/gpumem: 999999
