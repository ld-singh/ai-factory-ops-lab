# Scenario 2: request more GPU memory than a single device has, so the pod cannot fit and
# stays Pending. This proves HAMi's per-device memory accounting at the control-plane level
# (a pure scheduler decision - it never reaches the kubelet).
#
# 150% is impossible: no GPU has more than 100% of its own memory, so HAMi rejects it.
# (We use the percentage form because absolute gpumem can't register on the fake fleet -
# see 00-share.yaml.) Expect Pending with a CardInsufficientMemory-style reason.
#   TODO: confirm the exact reason string HAMi emits for an over-percentage request on your
#   version; capture it into evidence.
apiVersion: v1
kind: Pod
metadata:
  name: hami-overrequest
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: registry.k8s.io/pause:3.9
      resources:
        limits:
          nvidia.com/gpu: 1
          nvidia.com/gpumem-percentage: 150
