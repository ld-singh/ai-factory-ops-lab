# Scenario 1: a single fractional GPU request the HAMi scheduler can place and run.
#   nvidia.com/gpu: 1                 one (virtual) GPU
#   nvidia.com/gpumem-percentage: 30  30% of the device's memory for this slice
#   nvidia.com/gpucores: 30           30% of the device's compute
#
# Memory is requested as a PERCENTAGE, not absolute MiB: on the fake fleet the mock device
# plugin can't register absolute gpumem (the per-MiB device count exceeds the kubelet's
# ~120 GiB limit), so absolute gpumem comes back capacity 0. Percentage registers fine.
# See 00-share.yaml.
#
# The HAMi mutating webhook routes pods requesting these resources to the HAMi scheduler,
# so schedulerName is intentionally NOT set. The container is pause: it never touches a
# GPU - this is a control-plane-only placement test.
apiVersion: v1
kind: Pod
metadata:
  name: hami-fractional
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: registry.k8s.io/pause:3.9
      resources:
        limits:
          nvidia.com/gpu: 1
          nvidia.com/gpumem-percentage: 30
          nvidia.com/gpucores: 30
