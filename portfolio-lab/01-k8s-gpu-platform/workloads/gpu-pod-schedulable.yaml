# SCENARIO 1 — schedulable single-GPU pod.
# Requests 1 nvidia.com/gpu and targets the a100 pool. Expected: schedules onto
# kwok-gpu-a100-0 or -1 and reaches Running (KWOK simulates the lifecycle).
#
# SIMULATION HONESTY: the container never starts and no CUDA runs. This proves
# the scheduler's placement decision only.
apiVersion: v1
kind: Pod
metadata:
  name: cuda-batch-small
  namespace: gpu-demo
  labels:
    scenario: schedulable
spec:
  nodeSelector:
    gpu-pool: a100
  tolerations:
    - key: kwok.x-k8s.io/node     # required to land on KWOK fake nodes
      operator: Equal
      value: fake
      effect: NoSchedule
  containers:
    - name: cuda-batch
      # Image reference is intentionally a real CUDA base image so this exact
      # manifest is reusable in real-GPU mode (Phase 2). Update the tag to match
      # your driver/CUDA version on real hardware.
      image: nvidia/cuda:12.4.1-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: 1
  restartPolicy: Never
