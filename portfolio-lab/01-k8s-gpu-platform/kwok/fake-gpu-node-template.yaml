# fake-gpu-node-template.yaml
# Annotated reference template for a KWOK-managed fake GPU node.
# The generator script (../scripts/create-fake-gpu-nodes.sh) stamps out concrete
# nodes from this shape with pool-specific values substituted.
#
# SIMULATION SCOPE: this Node object is pure API state. There is no kubelet,
# no driver, no GPU. KWOK provides the node; the fake-gpu-operator advertises the
# GPUs onto it. It proves scheduler behaviour (and observability-pipeline shape) only.
apiVersion: v1
kind: Node
metadata:
  name: kwok-gpu-a100-0                  # pattern: kwok-gpu-<pool>-<index>
  annotations:
    kwok.x-k8s.io/node: fake             # tells KWOK to manage this node's lifecycle
    node.alpha.kubernetes.io/ttl: "0"
  labels:
    kubernetes.io/arch: amd64
    kubernetes.io/os: linux
    kubernetes.io/hostname: kwok-gpu-a100-0
    node-role.kubernetes.io/gpu-worker: ""
    type: kwok                           # easy bulk selection: kubectl get nodes -l type=kwok
    # --- Lab-specific pool label (workload nodeSelectors target this) -------
    gpu-pool: a100
    # --- The label the fake-gpu-operator keys off to advertise this pool's GPUs ---
    run.ai/simulated-gpu-node-pool: a100
    # --- GFD-style product label (name matches real GFD; for targeting/display) --
    nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
spec:
  taints:
    # Standard KWOK taint. Demo workloads tolerate it explicitly; anything that
    # doesn't tolerate it can never land on a fake node by accident.
    - key: kwok.x-k8s.io/node
      value: fake
      effect: NoSchedule
status:
  # NOTE: no nvidia.com/gpu here. The fake-gpu-operator advertises it onto the node
  # from the pool's topology (operator-shaped, like a real device plugin). The
  # scheduler then reads that integer from status.allocatable to place GPU pods.
  allocatable:
    cpu: "96"
    memory: 1024Gi
    pods: "110"
  capacity:
    cpu: "96"
    memory: 1024Gi
    pods: "110"
  nodeInfo:
    architecture: amd64
    operatingSystem: linux
    kubeletVersion: fake
    kubeProxyVersion: fake
    containerRuntimeVersion: fake
