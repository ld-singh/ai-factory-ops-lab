# ILLUSTRATIVE - Lesson 1B Exercise A. Two queues whose quotas sum to the fake
# fleet (16 + 16 = 32 GPUs). CONFIRM apiVersion/kind/field names against the KAI
# version you installed before applying - they change between releases.
apiVersion: scheduling.run.ai/v2        # CONFIRM: exact group/version in KAI docs
kind: Queue
metadata:
  name: team-research
spec:
  resources:
    gpu:
      quota: 16                          # CONFIRM field name (deserved/guaranteed share)
      overQuotaWeight: 1                 # CONFIRM: weight used when borrowing idle capacity
---
apiVersion: scheduling.run.ai/v2        # CONFIRM
kind: Queue
metadata:
  name: team-prod
spec:
  resources:
    gpu:
      quota: 16                          # CONFIRM
      overQuotaWeight: 1                 # CONFIRM
