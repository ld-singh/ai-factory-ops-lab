# ILLUSTRATIVE — Lesson 1B Exercises A–C. A Deployment of single-GPU pods pointed
# at KAI and tagged with a queue. Duplicate this per team (change name + queue
# value + replicas) to drive quota / borrowing / reclaim. CONFIRM the queue label
# KEY and schedulerName against the KAI version you installed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-job
  namespace: gpu-demo
spec:
  replicas: 16
  selector:
    matchLabels:
      app: research-job
  template:
    metadata:
      labels:
        app: research-job
        runai/queue: team-research      # CONFIRM: the exact queue label KEY in KAI docs
    spec:
      schedulerName: kai-scheduler       # CONFIRM: KAI's scheduler name
      tolerations:
        - key: kwok.x-k8s.io/node        # keep the KWOK toleration so pods land on fake nodes
          operator: Equal
          value: fake
          effect: NoSchedule
      containers:
        - name: worker
          image: nvidia/cuda:12.4.1-base-ubuntu22.04
          command: ["sleep", "infinity"]
          resources:
            limits:
              nvidia.com/gpu: 1
