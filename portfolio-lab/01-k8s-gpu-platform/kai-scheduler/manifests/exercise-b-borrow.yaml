# Exercise B - borrowing idle capacity.
# team-research is left idle (nothing submitted). team-prod asks for 16 GPUs, double its
# quota of 8. Concept: it should BORROW team-research's idle 8 and run beyond its quota.
# Observed on this fake fleet: it stays at ~8 (see the lesson README). Run this alone,
# then run Exercise C (reclaim) right after.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prod-borrow
  namespace: kai-demo
spec:
  replicas: 16
  selector:
    matchLabels:
      app: prod-borrow
  template:
    metadata:
      labels:
        app: prod-borrow
        kai.scheduler/queue: team-prod
    spec:
      schedulerName: kai-scheduler
      terminationGracePeriodSeconds: 0
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Equal
          value: fake
          effect: NoSchedule
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
