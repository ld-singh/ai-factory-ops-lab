# Exercise D, part 1 - the filler. Occupies 24 of the fleet's 32 GPUs, leaving 8 free,
# so the 10-pod gang in exercise-d-gang.yaml cannot fit yet. Assumes the fleet is
# otherwise idle (the demo clears kai-demo first). These are plain single-GPU pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gang-filler
  namespace: kai-demo
spec:
  replicas: 24
  selector:
    matchLabels:
      app: gang-filler
  template:
    metadata:
      labels:
        app: gang-filler
        kai.scheduler/queue: gang-demo
    spec:
      schedulerName: kai-scheduler
      terminationGracePeriodSeconds: 0
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Equal
          value: fake
          effect: NoSchedule
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
