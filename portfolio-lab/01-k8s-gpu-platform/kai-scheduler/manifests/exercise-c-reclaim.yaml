# Exercise C - reclaim. Apply this ON TOP OF Exercise B (do not clean in between).
# team-research (the owner) returns and asks for its guaranteed 8 GPUs. Concept: KAI
# evicts team-prod's borrowed pods so team-research reaches its quota. Watch the events
# with: kubectl get events -n kai-demo --sort-by=.lastTimestamp
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-reclaim
  namespace: kai-demo
spec:
  replicas: 8
  selector:
    matchLabels:
      app: research-reclaim
  template:
    metadata:
      labels:
        app: research-reclaim
        kai.scheduler/queue: team-research
    spec:
      schedulerName: kai-scheduler
      terminationGracePeriodSeconds: 0
      tolerations:
        - key: kwok.x-k8s.io/node
          operator: Equal
          value: fake
          effect: NoSchedule
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
          resources:
            limits:
              nvidia.com/gpu: 1
