# Slurm-in-Docker cluster for the AI Factory Operations Lab (Phase 3).
#
# Topology (mirrors a real small Slurm cluster):
#   mysql      - accounting database (MariaDB)
#   slurmdbd   - accounting daemon
#   slurmctld  - the controller = the scheduler (one brain)
#   c1, c2     - compute nodes (slurmd), each declaring 8 FAKE GPUs as GRES
#   login      - submit host you exec into to run sbatch/squeue/sacct
#
# The four /etc/slurm config files are bind-mounted read-only from ../config so
# you can read and edit them on the host. The munge key is a shared named volume.
#
# SIMULATION SCOPE: c1/c2 advertise gpu:8 with no backing device (gres.conf has
# no File=). Scheduling is real; nothing below slurmctld touches a GPU.
name: ai-factory-slurm

x-slurm-image: &slurm-image
  build:
    context: .
    dockerfile: Dockerfile
  image: ai-factory-slurm:lab

volumes:
  munge_key:      # shared munge.key across all Slurm containers
  mysql_data:     # accounting DB persistence

services:
  mysql:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: slurmlab
      MARIADB_DATABASE: slurm_acct_db
      MARIADB_USER: slurm
      MARIADB_PASSWORD: slurmlab
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  slurmdbd:
    <<: *slurm-image
    hostname: slurmdbd
    environment:
      SLURM_ROLE: slurmdbd
      MUNGE_CREATOR: "1"        # slurmdbd boots first, so it creates the munge key
      DB_HOST: mysql
    volumes:
      - munge_key:/etc/munge
      - ../config:/config:ro
    depends_on:
      mysql:
        condition: service_healthy

  slurmctld:
    <<: *slurm-image
    hostname: slurmctld
    environment:
      SLURM_ROLE: slurmctld
      DBD_HOST: slurmdbd
    volumes:
      - munge_key:/etc/munge
      - ../config:/config:ro
    depends_on:
      - slurmdbd

  c1:
    <<: *slurm-image
    hostname: c1
    environment:
      SLURM_ROLE: slurmd
      CTLD_HOST: slurmctld
    volumes:
      - munge_key:/etc/munge
      - ../config:/config:ro
    depends_on:
      - slurmctld

  c2:
    <<: *slurm-image
    hostname: c2
    environment:
      SLURM_ROLE: slurmd
      CTLD_HOST: slurmctld
    volumes:
      - munge_key:/etc/munge
      - ../config:/config:ro
    depends_on:
      - slurmctld

  login:
    <<: *slurm-image
    hostname: login
    environment:
      SLURM_ROLE: login
      CTLD_HOST: slurmctld
    volumes:
      - munge_key:/etc/munge
      - ../config:/config:ro
      - ../jobs:/jobs:ro          # the sbatch scripts, available inside the cluster
    depends_on:
      - slurmctld
