# cgroup.conf — AI Factory Operations Lab, Phase 3
# Reference: https://slurm.schedmd.com/cgroup.conf.html
#
# READ THIS FOR THE CONCEPT, not because it's doing work here. With
# TaskPlugin=task/none and ProctrackType=proctrack/linuxproc in slurm.conf, Slurm
# does NOT load a cgroup plugin in this lab, so these settings are effectively
# inert. We ship the file because reading it is a learning objective, and because
# it names the single most important real-GPU enforcement knob:
#
#     ConstrainDevices  — on a REAL node, this is what confines a job to ONLY the
#                         GPUs it was allocated (sets CUDA_VISIBLE_DEVICES and
#                         blocks the rest at the cgroup device level).
#
# In this fake-GRES simulation there are no devices to constrain, so everything
# is off. On real hardware (the optional Lesson 2 machine) you would flip
# ConstrainDevices=yes and use TaskPlugin=task/cgroup.
#
# NOTE: this lab runs Slurm 21.08 (Ubuntu's package), where there is no
# `CgroupPlugin` directive — that arrived in 23.02. The entrypoint therefore does
# NOT load this file at all (see docker/entrypoint.sh::setup_config); it lives
# here purely so you can read what real device constraint looks like. The line
# below is shown commented to stay valid across versions.

# CgroupPlugin=disabled        # 23.02+ only — the modern "turn cgroups off" knob
ConstrainCores=no
ConstrainDevices=no
ConstrainRAMSpace=no
