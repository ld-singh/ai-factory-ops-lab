# slurmdbd.conf - AI Factory Operations Lab, Phase 3
# Reference: https://slurm.schedmd.com/slurmdbd.conf.html
#
# The accounting daemon's config. It bridges slurmctld and the MariaDB database,
# and is what makes `sacct`, `sreport`, QoS limits, and fair-share possible.
#
# NOTE: this file must be mode 0600 owned by SlurmUser or slurmdbd refuses to
# start - the entrypoint installs it that way. The StoragePass below is a
# throwaway lab credential (matches docker-compose.yml); never reuse this pattern
# for anything real.

DbdHost=slurmdbd
SlurmUser=slurm
DebugLevel=info
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/var/log/slurm/slurmdbd.pid

StorageType=accounting_storage/mysql
StorageHost=mysql
StoragePort=3306
StorageUser=slurm
StoragePass=slurmlab
StorageLoc=slurm_acct_db
