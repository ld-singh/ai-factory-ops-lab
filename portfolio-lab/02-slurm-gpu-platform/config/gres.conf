# gres.conf - AI Factory Operations Lab, Phase 3
# Reference: https://slurm.schedmd.com/gres.conf.html
#
# THIS FILE IS THE FAKE/REAL BOUNDARY, made of two lines.
#
# On a REAL GPU node this file would bind each GPU to its device, e.g.:
#     AutoDetect=nvml
#     -- or explicitly --
#     NodeName=c1 Name=gpu Type=a100 File=/dev/nvidia[0-7]
# The File= line is what ties the GRES to a physical device and lets the cgroup
# device plugin constrain a job to exactly its allocated GPUs.
#
# Here we point File= at EIGHT FAKE device nodes that the entrypoint creates with
# `mknod` (major 195 = the real NVIDIA major; see docker/entrypoint.sh). They are
# empty character devices - slurmd counts them so it registers 8 GPUs and the
# scheduler does real `--gres=gpu:N` math, but there is no driver, no CUDA, and
# nothing to actually run behind them. Creating real char nodes (rather than a
# bare Count=) is what Slurm 21.08 needs to register the GRES at all. That hollow
# device is precisely what this simulation does NOT prove. See:
#   ../../06-validation-reports/fake-vs-real-limitations.md

AutoDetect=off
Name=gpu File=/dev/nvidia[0-7]
