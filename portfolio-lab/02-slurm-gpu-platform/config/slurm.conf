# slurm.conf - AI Factory Operations Lab, Phase 3 (fake-GRES scheduling simulation)
#
# Read this top to bottom: every block is annotated with WHY it's set, and which
# lines are the ones that make a *fake* GPU cluster schedule like a real one.
# Reference for every directive: https://slurm.schedmd.com/slurm.conf.html
# -----------------------------------------------------------------------------

ClusterName=ai-factory-lab
SlurmctldHost=slurmctld          # matches the docker-compose service/hostname
SlurmUser=slurm
MpiDefault=none

# --- Process tracking / task launch -----------------------------------------
# In plain Docker containers we do NOT have a usable cgroup device hierarchy, so
# we deliberately avoid the cgroup plugins. This is also WHY fake GRES is safe
# here: with task/none there is no attempt to bind a real /dev/nvidiaN device.
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none

# --- Scheduling --------------------------------------------------------------
SchedulerType=sched/backfill     # backfill lets small jobs fill gaps behind big ones
SelectType=select/cons_tres      # cons_tres = consumable cores + TRES (incl. GRES/GPU)
SelectTypeParameters=CR_Core

# --- GRES (Generic RESources) ------------------------------------------------
# THE line that turns these nodes into "GPU" nodes for the scheduler. The actual
# per-node device declaration is in gres.conf (count-only, no File= → fake).
GresTypes=gpu

# --- State / logging ---------------------------------------------------------
StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldPidFile=/var/log/slurm/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
SlurmctldDebug=info
SlurmdDebug=info

# ReturnToService=2: bring a node back to service when it registers even if it
# was previously DOWN - keeps the lab forgiving across restarts.
ReturnToService=2

# --- Accounting (slurmdbd) ---------------------------------------------------
# Required for QoS, fair-share, and `sacct`/`sreport`. Enforcing limits+qos is
# what makes the QoS-limit job scenario actually get blocked.
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStorageTRES=gres/gpu                 # track GPUs as a TRES so limits can target them
AccountingStorageEnforce=associations,limits,qos
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=10

# --- Priority (fair-share) ---------------------------------------------------
# Multifactor priority with a fair-share component - the basis of the fair-share
# exercise. Usage decays over a half-life so recent hogging is penalised.
PriorityType=priority/multifactor
PriorityWeightFairshare=10000
PriorityWeightAge=1000
PriorityDecayHalfLife=1-0          # 1 day

# --- Nodes -------------------------------------------------------------------
# RealMemory is kept LOW so any laptop's containers satisfy it (a node whose
# configured RealMemory exceeds what it actually has gets DRAINED). CPUs=16 makes
# the 8 GPUs the binding constraint for queue pressure (otherwise jobs bottleneck
# on cores, not GPUs). The Gres=gpu:8 is the fake part - no hardware behind it.
NodeName=c[1-2] CPUs=16 RealMemory=2000 Gres=gpu:8 State=UNKNOWN

# --- Partitions --------------------------------------------------------------
PartitionName=gpu Nodes=c[1-2] Default=YES MaxTime=INFINITE State=UP
